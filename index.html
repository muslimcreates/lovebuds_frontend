<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Buds App</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <!-- Font Awesome for icons -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Floating hearts container -->
  <div class="hearts"></div>

  <main class="container">
    <section class="hero">
      <h1 class="title">Welcome to Love Buds 💖</h1>
      <p class="description">
        Discover a world of love and connection. Send cute messages, explore sweet moments, 
        and make every day special with your partner.
      </p>

     <div class="login-buttons">
  <button class="login-btn instagram" onclick="window.location.href='login.html'">
    <i class="fab fa-instagram"></i> Login with Instagram
  </button>

  <button class="login-btn google">
    <i class="fab fa-google"></i> Login with Google
  </button>
</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
