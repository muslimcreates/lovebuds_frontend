<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Love Buds</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 20px;
      background-color: rgba(255, 255, 255, 0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    header h1 {
      font-size: 1.5rem;
      color: #fff;
    }

    header button {
      background: #fff;
      border: none;
      padding: 10px 15px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.2s;
    }

    header button:hover {
      transform: scale(1.1);
    }

    main {
      flex: 1;
      width: 90%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      margin-top: 40px;
      gap: 20px;
    }

    .chat-container {
      background: rgba(255,255,255,0.2);
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 400px;
      overflow-y: auto;
    }

    .chat-container div {
      background: rgba(255,255,255,0.6);
      padding: 8px 12px;
      border-radius: 12px;
      max-width: 80%;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px);}
      to { opacity: 1; transform: translateY(0);}
    }

    select, textarea, button {
      width: 100%;
      padding: 10px;
      border-radius: 12px;
      border: none;
      outline: none;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
    }

    textarea {
      resize: none;
      height: 80px;
    }

    button {
      background: #fff;
      color: #ff5c7a;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff5c7a;
      color: #fff;
    }

    @media (max-width: 500px) {
      header h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Welcome, <span id="usernameDisplay">Guest</span>!</h1>
    <button id="profileBtn">👤</button>
  </header>

  <main>
    <h2>Start Chatting</h2>

    <select id="userSelect">
      <option value="">-- Select a user --</option>
    </select>

    <textarea id="msgInput" placeholder="Type your message..."></textarea>
    <button id="sendBtn">Send Message</button>

    <div class="chat-container" id="chatBox"></div>
  </main>

  <script>
    // Replace this with username after login
    const username = sessionStorage.getItem("username") || "Guest";
    document.getElementById("usernameDisplay").textContent = username;

    const userSelect = document.getElementById("userSelect");
    const msgInput = document.getElementById("msgInput");
    const sendBtn = document.getElementById("sendBtn");
    const chatBox = document.getElementById("chatBox");

    const BASE_URL = "https://lovebuds-backend-1.onrender.com"; // <-- Replace with your deployed backend

    // Load all users
    async function loadUsers() {
      try {
        const res = await fetch(`${BASE_URL}/test`);
        const users = await res.json();
        userSelect.innerHTML = '<option value="">-- Select a user --</option>';
        users.forEach(u => {
          if(u.username !== username) {
            const opt = document.createElement("option");
            opt.value = u.username;
            opt.textContent = u.username;
            userSelect.appendChild(opt);
          }
        });
      } catch(err) {
        console.error(err);
      }
    }

    // Load messages with selected user
    async function loadMessages(peer) {
      if(!peer) return;
      try {
        const res = await fetch(`${BASE_URL}/messages/${peer}`);
        const messages = await res.json();
        chatBox.innerHTML = "";
        messages.forEach(m => {
          const div = document.createElement("div");
          div.textContent = `${m.sender}: ${m.message}`;
          chatBox.appendChild(div);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
      } catch(err) {
        console.error(err);
      }
    }

    // Send message
    sendBtn.addEventListener("click", async () => {
      const receiver = userSelect.value;
      const message = msgInput.value.trim();

      if (!receiver || !message) return alert("Select a user and type a message");

      try {
        await fetch(`${BASE_URL}/send-message`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sender: username, receiver, message })
        });
        msgInput.value = "";
        loadMessages(receiver);
      } catch(err) {
        console.error(err);
      }
    });

    // Update messages whenever user selection changes
    userSelect.addEventListener("change", () => {
      const peer = userSelect.value;
      loadMessages(peer);
    });

    // Initial load
    loadUsers();
  </script>

</body>
</html>
